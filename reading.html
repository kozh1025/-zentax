<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讀書・Zentax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2744;--gold:#c9922a;--bg:#f7f5f1;--border:#e4dfd7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#222;min-height:100vh}

.nav{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 20px;height:52px}
.nav-brand{display:flex;align-items:center;gap:7px;text-decoration:none;margin-right:6px}
.nav-icon{width:28px;height:28px;background:var(--navy);border-radius:7px;color:#fff;font-weight:800;font-size:.82em;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-name{font-weight:800;font-size:.97em;color:var(--navy)}.nav-brand-text{display:flex;flex-direction:column;gap:1px}.nav-tagline{font-size:.58em;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase;line-height:1;white-space:nowrap}
.nav-tag{background:#dbeafe;color:#2563eb;font-size:.68em;font-weight:700;padding:2px 8px;border-radius:5px;margin-right:12px;white-space:nowrap}
.nav-links{display:flex;align-items:center}
.nav-a{color:#64748b;font-size:.84em;font-weight:500;padding:0 11px;height:52px;display:flex;align-items:center;text-decoration:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-a:hover,.nav-a.on{color:var(--navy);border-bottom-color:#2563eb}
.nav-gap{flex:1}
.nav-cta{background:var(--navy);color:#fff !important;font-size:.78em;font-weight:700;padding:6px 14px;border-radius:8px;text-decoration:none;transition:opacity .15s;white-space:nowrap}
.nav-cta:hover{opacity:.85}
@media(max-width:640px){.nav-tag{display:none}.nav-links .nav-a:not(.on){display:none}}

.page-header{background:var(--navy);padding:52px 24px 60px;text-align:center;position:relative;overflow:hidden}
.page-header::after{content:'讀書';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-family:'DM Serif Display',serif;font-size:5em;color:rgba(255,255,255,.04);pointer-events:none}
.page-header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8em,4vw,2.4em);color:#fff;margin-bottom:10px}
.page-header p{color:rgba(255,255,255,.45);font-size:.9em;max-width:400px;margin:0 auto}

.wrap{max-width:820px;margin:0 auto;padding:52px 20px 80px}

.coming-soon{text-align:center;padding:64px 24px}
.cs-icon{font-size:3em;margin-bottom:20px}
.cs-title{font-family:'DM Serif Display',serif;font-size:1.8em;color:var(--navy);margin-bottom:12px}
.cs-sub{font-size:.92em;color:#888;max-width:400px;margin:0 auto 32px;line-height:1.75}
.cs-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:40px;text-align:left}
.cs-feat{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:22px 20px}
.cs-feat-icon{font-size:1.4em;margin-bottom:10px}
.cs-feat-title{font-weight:700;font-size:.9em;color:var(--navy);margin-bottom:6px}
.cs-feat-desc{font-size:.82em;color:#888;line-height:1.65}
.cs-tag{display:inline-block;background:rgba(201,146,42,.15);color:var(--gold);font-size:.72em;font-weight:700;letter-spacing:.1em;padding:3px 12px;border-radius:20px;border:1px solid rgba(201,146,42,.25);margin-bottom:16px}
.cta-link{display:inline-block;background:var(--navy);color:#fff;text-decoration:none;font-weight:700;font-size:.88em;padding:11px 24px;border-radius:10px;transition:opacity .15s}
.cta-link:hover{opacity:.85}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-icon">Z</div>
    <div class="nav-brand-text"><span class="nav-name">Zentax</span><span class="nav-tagline">Practice · Master · Pass</span></div>
  </a>
  <span class="nav-tag">多益</span>
  <div class="nav-links">
    <a class="nav-a" href="dashboard.html">開始備考</a>
    <a class="nav-a on" href="reading.html">讀書</a>
    <a class="nav-a" href="quiz.html">刷題</a>
    <a class="nav-a" href="review.html">訂正</a>
    <a class="nav-a" href="pricing.html">方案</a>
  </div>
  <div class="nav-gap"></div>
  <a class="nav-cta" href="dashboard.html">開始備考</a>
</nav>

<div class="page-header">
  <h1>讀書</h1>
  <p>高頻考點整理 × 單字解析 × 文法補充，系統化建立答題框架</p>
</div>

<div class="wrap">
  <div class="coming-soon">
    <div class="cs-tag">即將推出</div>
    <div class="cs-icon">📖</div>
    <div class="cs-title">讀書功能建置中</div>
    <div class="cs-sub">
      正在整理高頻考點筆記與單字解析，<br>
      即將與題庫一起開放。先去刷題練手感吧！
    </div>
    <a class="cta-link" href="quiz.html">先去刷題 →</a>

    <div class="cs-features">
      <div class="cs-feat">
        <div class="cs-feat-icon">🎯</div>
        <div class="cs-feat-title">高頻考點</div>
        <div class="cs-feat-desc">依出題頻率整理重點，不花時間在低頻考點上</div>
      </div>
      <div class="cs-feat">
        <div class="cs-feat-icon">📝</div>
        <div class="cs-feat-title">單字 × 詞性對照</div>
        <div class="cs-feat-desc">每個單字附詞性、中文、例句，快速記憶不死背</div>
      </div>
      <div class="cs-feat">
        <div class="cs-feat-icon">⚙️</div>
        <div class="cs-feat-title">文法解析</div>
        <div class="cs-feat-desc">常考文法句型說明，搭配題目範例一看就懂</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
