<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷題・Zentax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a3557;--blue:#2563eb;--blue-lt:#eff6ff;--gold:#c9922a;--bg:#f0f2f5;--white:#fff;--bd:#e2e8f0;--text:#1e293b;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}

/* Nav */
.nav{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;height:52px}
.nav-brand{display:flex;align-items:center;gap:7px;text-decoration:none;margin-right:6px}
.nav-icon{width:28px;height:28px;background:var(--navy);border-radius:7px;color:#fff;font-weight:800;font-size:.82em;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-name{font-weight:800;font-size:.97em;color:var(--navy)}.nav-brand-text{display:flex;flex-direction:column;gap:1px}.nav-tagline{font-size:.58em;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase;line-height:1;white-space:nowrap}
.nav-tag{background:#dbeafe;color:var(--blue);font-size:.68em;font-weight:700;padding:2px 8px;border-radius:5px;margin-right:12px;white-space:nowrap}
.nav-links{display:flex;align-items:center}
.nav-a{color:var(--muted);font-size:.84em;font-weight:500;padding:0 11px;height:52px;display:flex;align-items:center;text-decoration:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-a:hover,.nav-a.on{color:var(--navy);border-bottom-color:var(--blue)}
.nav-gap{flex:1}
.nav-plan{background:var(--navy);color:#fff;font-size:.78em;font-weight:700;padding:6px 14px;border-radius:8px;text-decoration:none;margin-right:10px;transition:opacity .15s;white-space:nowrap}
.nav-plan:hover{opacity:.85}
@media(max-width:640px){.nav-tag{display:none}.nav-links .nav-a:not(.on){display:none}}

/* Page header */
.page-header{background:var(--white);border-bottom:1px solid var(--bd);padding:18px 20px 16px}
.page-header-inner{max-width:900px;margin:0 auto}
.page-header h1{font-size:1.25em;font-weight:800;color:var(--text);margin-bottom:2px}
.page-header p{font-size:.81em;color:var(--muted)}

/* Wrap */
.wrap{max-width:900px;margin:0 auto;padding:28px 20px 64px}

/* Section label */
.section-label{font-size:.75em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bd)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:var(--white);border-radius:12px;padding:20px 18px;border:1px solid var(--bd);text-decoration:none;color:inherit;display:block;transition:transform .15s,box-shadow .15s,border-color .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08);border-color:#c7d2e0}
.card-num{font-size:.69em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.card-title{font-size:.9em;font-weight:700;color:var(--navy);margin-bottom:14px;line-height:1.35}
.card-link{background:var(--navy);color:#fff;text-align:center;padding:8px;border-radius:8px;font-size:.8em;font-weight:600}

/* Loading / error */
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{text-align:center;padding:48px 20px}
.error-t{font-size:1em;font-weight:700;color:var(--navy);margin-bottom:8px}
.error-s{font-size:.84em;color:var(--muted)}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-icon">Z</div>
    <div class="nav-brand-text"><span class="nav-name">Zentax</span><span class="nav-tagline">Practice · Master · Pass</span></div>
  </a>
  <div class="nav-links">
    <a class="nav-a" href="dashboard.html">開始備考</a>
    <a class="nav-a" href="reading.html">讀書</a>
    <a class="nav-a on" href="quiz.html">刷題</a>
    <a class="nav-a" href="review.html">訂正</a>
    <a class="nav-a" href="pricing.html">方案</a>
  </div>
  <div class="nav-gap"></div>
  <a class="nav-plan" href="pricing.html">查看方案</a>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>刷題</h1>
    <p id="subtitle">載入中…</p>
  </div>
</div>

<div class="wrap" id="wrap">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script>
const REPO = 'kozh1025/-zentax';
const API  = `https://api.github.com/repos/${REPO}/contents/`;
const BASE = `https://kozh1025.github.io/-zentax/`;

const EXCLUDE = new Set([
  'index.html','quiz.html','reading.html','review.html',
  'pricing.html','dashboard.html'
]);

async function init() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(res.status);
    const files = (await res.json()).filter(f =>
      f.type === 'file' &&
      f.name.toLowerCase().endsWith('.html') &&
      !EXCLUDE.has(f.name.toLowerCase())
    ).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

    document.getElementById('subtitle').textContent =
      files.length ? `共 ${files.length} 份題組，點選開始作答` : '暫無題組';

    document.getElementById('wrap').innerHTML = files.length
      ? `<div class="section-label">全部題組</div>
         <div class="grid">${files.map(cardHTML).join('')}</div>`
      : `<div class="error-state"><div class="error-t">暫無題組</div><div class="error-s">題組上架後會自動顯示於此</div></div>`;
  } catch(e) {
    document.getElementById('subtitle').textContent = '載入失敗';
    document.getElementById('wrap').innerHTML = `
      <div class="error-state">
        <div class="error-t">無法載入題組列表</div>
        <div class="error-s">請檢查網路連線後重新整理</div>
      </div>`;
  }
}

function cardHTML(f) {
  const num   = f.name.match(/\d+/)?.[0] || '';
  const label = num ? `題組 ${num}` : f.name.replace(/\.html$/i, '');
  return `<a class="card" href="${BASE}${f.name}">
    <div class="card-num">TOEIC · SET ${num || '–'}</div>
    <div class="card-title">${label}</div>
    <div class="card-link">開始作答 →</div>
  </a>`;
}

init();
</script>
</body>
</html>
