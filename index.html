<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentax・英語備考平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a3557;--toeic:#1a3557;--gept:#15803d;--bg:#f0f2f5;--white:#fff;--bd:#e2e8f0;--text:#1e293b;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.brand-icon{width:40px;height:40px;background:var(--navy);border-radius:10px;color:#fff;font-weight:800;font-size:1.1em;display:flex;align-items:center;justify-content:center}
.brand-name{font-weight:800;font-size:1.4em;color:var(--navy)}
.brand-tagline{font-size:.72em;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:36px;text-align:center}
.title{font-size:1.05em;font-weight:700;color:var(--muted);margin-bottom:18px;text-align:center;letter-spacing:.05em;text-transform:uppercase}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:500px}
@media(max-width:480px){.cards{grid-template-columns:1fr}}
.card{background:var(--white);border:2px solid var(--bd);border-radius:16px;padding:28px 24px;text-decoration:none;color:var(--text);transition:all .18s;display:flex;flex-direction:column;align-items:flex-start;gap:12px}
.card:hover{border-color:var(--card-color);box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2em;font-weight:800;color:#fff;background:var(--card-color)}
.card-name{font-size:1.05em;font-weight:800;color:var(--text)}
.card-desc{font-size:.8em;color:var(--muted);line-height:1.6}
.card-arrow{font-size:.82em;font-weight:700;color:var(--card-color);margin-top:4px}
.card.toeic{--card-color:var(--toeic)}
.card.gept{--card-color:var(--gept)}
.footer{margin-top:36px;font-size:.75em;color:#bbb;text-align:center}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">Z</div>
  <div class="brand-name">Zentax</div>
</div>
<div class="brand-tagline">Practice · Master · Pass</div>

<div class="title">選擇考種</div>

<div class="cards">
  <a class="card toeic" href="TOEIC/index.html">
    <div class="card-icon">T</div>
    <div class="card-name">TOEIC 英語</div>
    <div class="card-desc">TOEIC-style practice questions<br>商務英語能力測驗備考</div>
    <div class="card-arrow">開始備考 →</div>
  </a>
  <a class="card gept" href="GEPT/index.html">
    <div class="card-icon">G</div>
    <div class="card-name">GEPT 全民英檢</div>
    <div class="card-desc">GEPT-style practice questions<br>全民英語能力分級檢定備考</div>
    <div class="card-arrow">開始備考 →</div>
  </a>
</div>

<div class="footer">© 2026 Zentax · 一次付款，不自動續扣</div>

</body>
</html>
